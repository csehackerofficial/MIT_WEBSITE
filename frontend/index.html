<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- ==========================================
         MASTER LEVEL SEO TAGS
    =========================================== -->
    <!-- Primary Meta Tags -->
    <title>DownZero | Maximum Quality Video Downloader</title>
    <meta name="title" content="DownZero | Maximum Quality Video Downloader">
    <meta name="description" content="DownZero is a minimalist, maximum-quality video downloader. Download high-resolution videos instantly with zero ads, zero wait times, and zero distractions.">
    <meta name="keywords" content="video downloader, high quality downloader, 4k video download, mp4 download, zero ads downloader, DownZero, yt download">
    <meta name="author" content="DownZero">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://your-netlify-url.netlify.app/">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://your-netlify-url.netlify.app/">
    <meta property="og:title" content="DownZero | Maximum Quality Video Downloader">
    <meta property="og:description" content="Download high-resolution videos instantly with zero ads, zero wait times, and zero distractions.">
    <!-- Add an actual image URL below later for link previews -->
    <meta property="og:image" content="https://your-netlify-url.netlify.app/og-image.jpg">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://your-netlify-url.netlify.app/">
    <meta property="twitter:title" content="DownZero | Maximum Quality Video Downloader">
    <meta property="twitter:description" content="Download high-resolution videos instantly with zero ads, zero wait times, and zero distractions.">
    <meta property="twitter:image" content="https://your-netlify-url.netlify.app/og-image.jpg">

    <!-- JSON-LD Schema Markup (Tells Google exactly what this app is) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "DownZero",
      "url": "https://your-netlify-url.netlify.app/",
      "description": "A minimalist, maximum-quality video downloader with zero ads and zero distractions.",
      "applicationCategory": "MultimediaApplication",
      "operatingSystem": "All",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      }
    }
    </script>

    <!-- ==========================================
         PURE BLACK & WHITE STOIC STYLES
    =========================================== -->
    <style>
        body { 
            background-color: #000000; 
            color: #ffffff; 
            font-family: 'Courier New', Courier, monospace; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
        }
        main { 
            border: 1px solid #ffffff; 
            padding: 50px 40px; 
            width: 100%; 
            max-width: 450px; 
            text-align: center; 
            box-sizing: border-box; 
        }
        h1 { 
            margin-top: 0; 
            margin-bottom: 5px; 
            letter-spacing: 6px; 
            text-transform: uppercase; 
            font-size: 36px; 
            font-weight: bold;
        }
        p.subtitle { 
            margin-top: 0; 
            margin-bottom: 40px; 
            font-size: 12px; 
            color: #888888; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
        }
        input[type="url"] { 
            width: 100%; 
            padding: 16px; 
            margin-bottom: 20px; 
            box-sizing: border-box; 
            background-color: #000000; 
            color: #ffffff; 
            border: 1px solid #ffffff; 
            font-family: inherit; 
            font-size: 14px; 
            outline: none; 
            transition: border-color 0.3s;
        }
        input[type="url"]::placeholder { 
            color: #555555; 
            letter-spacing: 1px;
        }
        input[type="url"]:focus { 
            background-color: #0a0a0a; 
            border-color: #ffffff; 
            box-shadow: 0 0 5px rgba(255, 255, 255, 0.2);
        }
        button { 
            width: 100%; 
            background-color: #ffffff; 
            color: #000000; 
            border: none; 
            padding: 16px; 
            font-size: 16px; 
            font-family: inherit; 
            font-weight: bold; 
            cursor: pointer; 
            text-transform: uppercase; 
            letter-spacing: 1px;
            transition: 0.2s ease; 
        }
        button:hover { 
            background-color: #cccccc; 
        }
        footer { 
            margin-top: 30px; 
            font-size: 10px; 
            color: #444444; 
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <!-- Semantic HTML5 tags for better SEO -->
    <main>
        <h1>DownZero</h1>
        <p class="subtitle">Zero Ads. Zero Limits.</p>
        
        <!-- Action URL needs your Render link -->
        <form action="https://downzero-api.onrender.com/" method="POST">
            <!-- aria-label added for accessibility (SEO ranking factor) -->
            <input type="url" name="url" placeholder="PASTE VIDEO LINK HERE" required aria-label="Video URL Input">
            <button type="submit">Download Video</button>
        </form>

        <footer>MAXIMUM AVAILABLE QUALITY PROCESSED</footer>
    </main>

    <script>
    const form = document.querySelector('form');
    const btn = document.querySelector('button');

    form.onsubmit = () => {
        btn.innerText = "Processing... Please wait";
        btn.style.backgroundColor = "#444";
        btn.disabled = true;
        // 10 second baad button wapas normal kar dena agar download shuru na ho
        setTimeout(() => {
            btn.innerText = "Download Video";
            btn.style.backgroundColor = "#ffffff";
            btn.disabled = false;
        }, 15000);
    };
</script>
</body>
</html>
