<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="icon" href="https://www.gstatic.com/youtube/img/branding/favicon/favicon_144x144.png" type="image/png">

    <title>DownZero | Maximum Quality Video Downloader</title>
    <meta name="title" content="DownZero | Maximum Quality Video Downloader">
    <meta name="description" content="DownZero is a minimalist, maximum-quality video downloader. Download high-resolution videos instantly with zero ads and zero distractions.">
    <meta name="keywords" content="video downloader, high quality downloader, 4k video download, mp4 download, zero ads downloader, DownZero, yt download">
    <meta name="author" content="thecsehacker">
    <meta name="robots" content="index, follow">

    <meta property="og:type" content="website">
    <meta property="og:title" content="DownZero | Maximum Quality Video Downloader">
    <meta property="og:description" content="Download high-resolution videos instantly with zero ads and zero distractions.">

    <style>
        body { 
            background-color: #000000; 
            color: #ffffff; 
            font-family: 'Courier New', Courier, monospace; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
        }
        main { 
            border: 1px solid #ffffff; 
            padding: 50px 40px; 
            width: 100%; 
            max-width: 450px; 
            text-align: center; 
            box-sizing: border-box; 
        }
        h1 { 
            margin-top: 0; 
            margin-bottom: 5px; 
            letter-spacing: 6px; 
            text-transform: uppercase; 
            font-size: 36px; 
            font-weight: bold;
        }
        p.subtitle { 
            margin-top: 0; 
            margin-bottom: 40px; 
            font-size: 12px; 
            color: #888888; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
        }
        input[type="url"] { 
            width: 100%; 
            padding: 16px; 
            margin-bottom: 20px; 
            box-sizing: border-box; 
            background-color: #000000; 
            color: #ffffff; 
            border: 1px solid #ffffff; 
            font-family: inherit; 
            font-size: 14px; 
            outline: none; 
            transition: border-color 0.3s;
        }
        input[type="url"]::placeholder { 
            color: #555555; 
            letter-spacing: 1px;
        }
        button { 
            width: 100%; 
            background-color: #ffffff; 
            color: #000000; 
            border: none; 
            padding: 16px; 
            font-size: 16px; 
            font-family: inherit; 
            font-weight: bold; 
            cursor: pointer; 
            text-transform: uppercase; 
            letter-spacing: 1px;
            transition: 0.2s ease; 
        }
        button:hover { background-color: #cccccc; }
        button:disabled { background-color: #444; color: #888; cursor: not-allowed; }
        
        #error-msg { color: #ff3333; font-size: 11px; margin-top: 15px; display: none; }
        footer { 
            margin-top: 30px; 
            font-size: 10px; 
            color: #444444; 
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <main>
        <h1>DownZero</h1>
        <p class="subtitle">Zero Ads. Zero Limits.</p>
        
        <form id="dlForm">
            <input type="url" name="url" placeholder="PASTE VIDEO LINK HERE" required aria-label="Video URL Input">
            <button type="submit" id="dlBtn">Download Video</button>
        </form>

        <div id="error-msg">Error: Please try again later.</div>

        <footer>MAXIMUM AVAILABLE QUALITY PROCESSED</footer>
    </main>

    <script>
        const form = document.getElementById('dlForm');
        const btn = document.getElementById('dlBtn');
        const errorMsg = document.getElementById('error-msg');

        form.onsubmit = async (e) => {
            e.preventDefault(); // Default form submit roko
            
            // UI Update
            btn.innerText = "GENERATING LINK...";
            btn.disabled = true;
            errorMsg.style.display = "none";

            const formData = new FormData(form);

            try {
                // Backend API call (Render URL)
                const response = await fetch('https://downzero-api.onrender.com/download', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (data.download_url) {
                    // Download link milne par redirect karo
                    btn.innerText = "STARTING DOWNLOAD";
                    window.location.href = data.download_url;
                } else {
                    throw new Error(data.error || "Failed to fetch link");
                }

            } catch (err) {
                console.error(err);
                errorMsg.innerText = "ERROR: " + err.message;
                errorMsg.style.display = "block";
            } finally {
                // 10 second baad button wapas normal
                setTimeout(() => {
                    btn.innerText = "DOWNLOAD VIDEO";
                    btn.disabled = false;
                }, 10000);
            }
        };
    </script>
</body>
</html>
